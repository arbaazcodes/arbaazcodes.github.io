[build]
  command = "bun run build"
  publish = "dist/client"

[build.environment]
  # Tell Nitro (used by TanStack Start) to build for Netlify instead of Cloudflare.
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"
  # If `bun run build` is not detected, Netlify falls back to npm; this keeps installs fast.
  NPM_FLAGS = "--legacy-peer-deps"

# Nitro's Netlify preset emits a serverless function that handles SSR + all routes.
# This redirect makes sure every non-static request goes through it.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
